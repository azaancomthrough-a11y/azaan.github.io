<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azaan Tools</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}
header{padding:40px;text-align:center;background:linear-gradient(135deg,#3b82f6,#9333ea)}
nav{background:#020617;padding:10px;text-align:center}
nav a{color:#aaa;margin:10px;text-decoration:none}
.container{padding:20px;max-width:900px;margin:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#1e293b;padding:20px;border-radius:10px}
button{padding:10px;border:none;background:#3b82f6;color:white;border-radius:6px}
input,textarea{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none}
footer{text-align:center;padding:15px;background:#020617}
</style>
</head>

<body>

<header>
<h1>Azaan Tools</h1>
<p>Fast • Free • Powerful Online Tools</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#tools">Tools</a>
</nav>

<div class="container">

<h2 id="tools">🔥 Tools</h2>

<div class="grid">

<div class="card">
<h3>🧮 Calculator</h3>
<button onclick="openCalc()">Open</button>
</div>

<div class="card">
<h3>🔤 Word Counter</h3>
<button onclick="openWord()">Open</button>
</div>

</div>

</div>

<!-- TOOLS -->
<div id="calcBox" style="display:none;padding:20px;">
<h2>Calculator</h2>
<input id="n1" placeholder="Number 1">
<input id="n2" placeholder="Number 2">
<button onclick="calc()">Add</button>
<p id="ans"></p>
</div>

<div id="wordBox" style="display:none;padding:20px;">
<h2>Word Counter</h2>
<textarea id="text"></textarea>
<button onclick="count()">Count</button>
<p id="result"></p>
</div>

<footer>
© 2026 Azaan Tools
</footer>

<script>
function openCalc(){
document.getElementById("calcBox").style.display="block";
}
function openWord(){
document.getElementById("wordBox").style.display="block";
}
function calc(){
let a=+document.getElementById("n1").value;
let b=+document.getElementById("n2").value;
document.getElementById("ans").innerText="Result: "+(a+b);
}
function count(){
let t=document.getElementById("text").value;
let w=t.trim().split(/\s+/).length;
document.getElementById("result").innerText="Words: "+w;
}
</script>

</body>
</html>
