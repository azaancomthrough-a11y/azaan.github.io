<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: black;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* glowing background */
.glow {
  position: absolute;
  width: 300px;
  height: 300px;
  background: rgba(0,255,255,0.2);
  border-radius: 50%;
  animation: float 6s infinite ease-in-out;
}

.glow.left { left: 0; }
.glow.right { right: 0; }

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-200px); }
  100% { transform: translateY(0); }
}

.content {
  position: relative;
  top: 30%;
}

/* buttons */
.btn {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  background: cyan;
  color: black;
  transition: 0.3s;
}

.btn:hover {
  background: white;
}
</style>

<script>
function playSound() {
  let audio = new Audio("https://www.soundjay.com/button/beep-07.wav");
  audio.play();
}
</script>

</head>

<body onclick="playSound()">

<div class="glow left"></div>
<div class="glow right"></div>

<div class="content">
  <h1>🔥 Azaan Ultimate Site 😎</h1>
  <p>Welcome to my pro animated website</p>

  <button class="btn" onclick="location.href='about.html'">About</button>
  <button class="btn" onclick="location.href='contact.html'">Contact</button>
</div>

</body>
</html>
