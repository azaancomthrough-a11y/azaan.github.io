<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="favicon.png">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: black;
  color: white;
  text-align: center;
  scroll-behavior: smooth;
}

/* Navbar */
nav {
  background: #111;
  padding: 10px;
  position: sticky;
  top: 0;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

/* Loader */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 35px;
  z-index: 9999;
}

/* Animation */
#loader h1 {
  animation: zoom 1s infinite alternate;
}

@keyframes zoom {
  from {transform: scale(1);}
  to {transform: scale(1.2);}
}

/* Sections */
section {
  padding: 60px 20px;
}

.btn {
  display: inline-block;
  padding: 10px 20px;
  background: orange;
  color: black;
  text-decoration: none;
  margin-top: 10px;
}
</style>

</head>

<body>

<!-- 🔥 Loader -->
<div id="loader">
  <h1>Azaan Art</h1>
</div>

<!-- 🔗 Navbar -->
<nav>
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#contact">Contact</a>
</nav>

<!-- 🏠 Home -->
<section id="home">
  <h1>Azaan Web Developer</h1>
  <p>I create modern and responsive websites 🚀</p>
</section>

<!-- 👤 About -->
<section id="about">

  <p>I am Azaan, a beginner web developer learning HTML, CSS and building modern websites.</p>
</section>

<!-- 📞 Contact -->
<section id="contact">
  <h1>Contact Me</h1>
  <p>Email: yourname@gmail.com</p>
  <a href="mailto:yourname@gmail.com" class="btn">Message Me</a>
</section>

<!-- ⚡ JS -->
<script>
window.addEventListener("load", function(){
  setTimeout(function(){
    document.getElementById("loader").style.display = "none";
  }, 2000);
});
</script>

</body>

</html>
