<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #7f0000;
  color: white;
  text-align: center;
  font-family: sans-serif;
  overflow: hidden;
}

.smoke {
  position: absolute;
  bottom: -100px;
  width: 200px;
  height: 200px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  animation: rise 6s infinite ease-in;
}

.smoke.left {
  left: 0;
}

.smoke.right {
  right: 0;
}

@keyframes rise {
  0% {
    transform: translateY(0) scale(1);
    opacity: 0.4;
  }
  100% {
    transform: translateY(-800px) scale(2);
    opacity: 0;
  }
}

.content {
  position: relative;
  top: 30%;
}

a {
  color: lightblue;
}
</style>

</head>

<body>

<div class="smoke left"></div>
<div class="smoke right"></div>

<div class="content">

</div>

</body>
</html>
