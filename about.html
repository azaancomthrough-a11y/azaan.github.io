<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: linear-gradient(to right, #020617, #0f172a);
  color: white;
  text-align: center;
  font-family: sans-serif;
  overflow: hidden;
}

/* Glow circles animation */
.circle {
  position: absolute;
  width: 200px;
  height: 200px;
  background: rgba(0,255,255,0.1);
  border-radius: 50%;
  animation: move 8s infinite ease-in-out;
}

.circle.left {
  left: 0;
}

.circle.right {
  right: 0;
}

@keyframes move {
  0% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-300px) scale(1.5); }
  100% { transform: translateY(0) scale(1); }
}

.content {
  position: relative;
  top: 30%;
}

a {
  color: lightblue;
}
</style>

</head>

<body>

<div class="circle left"></div>
<div class="circle right"></div>

<div class="content">
  <h1>About Me 😎</h1>

  <p>My name is Azaan.</p>
  <p>I am learning web development and building websites.</p>
  <p>I create simple and modern websites using HTML and GitHub Pages.</p>

  <br>
  <a href="index.html">⬅ Back to Home</a>
</div>

</body>
</html>
